name: Validate merchants.json

on:
  pull_request:
    paths:
      - 'src/data/merchants.json'
  push:
    branches:
      - master
    paths:
      - 'src/data/merchants.json'

jobs:
  validate:
    name: Schema & data quality checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Run validation
        run: node scripts/validate-merchants.js
